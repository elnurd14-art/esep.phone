  function sbHeaders(extra){
    var h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession?_sbSession.access_token:SB_KEY)};
    return Object.assign(h,extra||{});
  }
  async function sbFetch(path,opts){
    try{
      var o=opts||{};
      var headers=Object.assign(sbHeaders(),o.headers||{});
      var fetchOpts=Object.assign({},o,{headers:headers});
      var r=await fetch(SB_URL+path,fetchOpts);
      // Auto-refresh on 401 (expired access token)
      if(r.status===401&&_sbSession&&_sbSession.refresh_token){
        var refreshed=await sbRefreshSession(_sbSession.refresh_token);
        if(refreshed){
          // Retry with new token
          headers=Object.assign(sbHeaders(),o.headers||{});
          fetchOpts=Object.assign({},o,{headers:headers});
          r=await fetch(SB_URL+path,fetchOpts);
        } else {
          // Refresh failed — force logout
          sbSignOut();
          S.authScreen="login";render();
          throw new Error("Сессия истекла. Войдите снова.");
        }
      }
      if(r.status===204)return null;
      var j=await r.json();
      if(!r.ok)throw new Error(j.error_description||j.message||JSON.stringify(j));
      return j;
    }catch(e){console.error('SB:',path,e);throw e;}
  }
  async function sbAuthFetch(path,opts){
    var r=await fetch(SB_URL+path,Object.assign({headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(_sbSession?_sbSession.access_token:SB_KEY)}},opts||{}));
    var j=await r.json();
    if(!r.ok)throw new Error(j.error_description||j.msg||j.message||JSON.stringify(j));
    return j;
  }

  // Auth
  async function sbSignUp(email,pass){
    return sbAuthFetch('/auth/v1/signup',{method:'POST',body:JSON.stringify({email,password:pass})});

  async function sbSignIn(email,pass){
    var j=await sbAuthFetch('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password:pass})});

    lsSet('esep_session',_sbSession);
    return j;
  }
  async function sbRefreshSession(refreshToken){
    try{
      var j=await sbAuthFetch('/auth/v1/token?grant_type=refresh_token',{method:'POST',body:JSON.stringify({refresh_token:refreshToken})});
      _sbSession={access_token:j.access_token,refresh_token:j.refresh_token,user:j.user};
      lsSet('esep_session',_sbSession);
      return true;
    }catch(e){return false;}
  }
  function sbSignOut(){_sbSession=null;_venueId=null;_venueRole=null;_venues=[];lsDel('esep_session');lsDel('esep_venue');}

  function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}

  // Venues
  async function sbLoadVenues(){
    var rows=await sbFetch('/rest/v1/venues?select=id,name,address,phone,bin,owner_id&order=created_at.asc');

    if(_venues.length){
      var vmRows=await sbFetch('/rest/v1/venue_members?select=venue_id,role&user_id=eq.'+_sbSession.user.id);
      var roleMap={};
      (Array.isArray(vmRows)?vmRows:[]).forEach(function(r){roleMap[r.venue_id]=r.role;});
      _venues.forEach(function(v){v._role=roleMap[v.id]||'owner';});
    }
    return _venues;
  }
  async function sbCreateVenue(name){
    var rows=await sbFetch('/rest/v1/venues?select=id,name',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({owner_id:_sbSession.user.id,name:name})});
    return Array.isArray(rows)?rows[0]:rows;
  }

  // KV store (настройки заведения)
  async function sbKvGet(key,def){
    try{
      var rows=await sbFetch('/rest/v1/kv_store?select=value&venue_id=eq.'+_venueId+'&key=eq.'+encodeURIComponent(key));
      if(rows&&rows.length)return JSON.parse(rows[0].value);
      return def;
    }catch(e){return def;}
  }
  async function sbKvSet(key,val){
    try{
      await sbFetch('/rest/v1/kv_store?on_conflict=venue_id,key',{
        method:'POST',
        headers:{'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({venue_id:_venueId,key:key,value:JSON.stringify(val),updated_at:new Date().toISOString()})
      });
    }catch(e){console.warn('kvSet err',key,e);}
  }
  async function sbKvGetAll(keys){
    try{
      var ks=keys.map(function(k){return '"'+k+'"';}).join(',');
      var rows=await sbFetch('/rest/v1/kv_store?select=key,value&venue_id=eq.'+_venueId+'&key=in.('+ks+')');
      var m={};
      (Array.isArray(rows)?rows:[]).forEach(function(r){try{m[r.key]=JSON.parse(r.value);}catch(e){m[r.key]=r.value;}});
      return m;
    }catch(e){return {};}
  }

  // Cash days
  async function saveCashDay(date,dayData){
    if(!_venueId)return;
    try{
      await sbFetch('/rest/v1/cash_days?on_conflict=venue_id,date',{
        method:'POST',
        headers:{'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({venue_id:_venueId,date:date,data:dayData,updated_at:new Date().toISOString()})
      });
    }catch(e){console.warn('saveCashDay err',date,e);}
  }
  async function loadCashAllMonths(){
    if(!_venueId)return {};
    try{
      var now=new Date();
      var from=new Date(now.getFullYear()-3,0,1).toISOString().slice(0,10); // 3 years back
      var rows=await sbFetch('/rest/v1/cash_days?select=date,data&venue_id=eq.'+_venueId+'&date=gte.'+from+'&order=date.asc');
      var cash={};
      (Array.isArray(rows)?rows:[]).forEach(function(r){cash[r.date]=r.data;});
      return cash;
    }catch(e){console.warn('loadCash err',e);return {};}

  function save(k,v){ss(k,v);}

  // P&L calc helper
  // Aggregate calcPL over all 12 months of a year when ym="YYYY-00"
  function calcPL(ym){
    if(ym.slice(5)==="00"){
      var yr=ym.slice(0,4);
      var agg=null;
      for(var mi=1;mi<=12;mi++){
        var mym=yr+"-"+pad2(mi);
        var mp=calcPL(mym);
        if(!agg){agg=JSON.parse(JSON.stringify(mp));}
        else{
          var numKeys=['total','cost','opex','other','totExp','cashExp','fixedT','gross','net','checks','fotExp','rentExp','utilExp','mktExp','commissions','opProfit','opexOther'];
          numKeys.forEach(function(k){agg[k]=(agg[k]||0)+(mp[k]||0);});
          // ci totals
          agg.ci.total+=mp.ci.total;agg.ci.ect+=mp.ci.ect;agg.ci.edt+=mp.ci.edt;
          Object.keys(mp.ci.by).forEach(function(k){agg.ci.by[k]=(agg.ci.by[k]||0)+mp.ci.by[k];});
          // am totals
          agg.am.acq+=mp.am.acq;agg.am.agg+=mp.am.agg;
          // opexByCat
          Object.keys(mp.opexByCat||{}).forEach(function(k){agg.opexByCat[k]=(agg.opexByCat[k]||0)+(mp.opexByCat[k]||0);});
        }
      }
      if(!agg) return calcPL(yr+"-01");
      // Recompute derived ratios
      var dim=365;var todayD=new Date().getDate();
      agg.fc=agg.total>0?(agg.cost/agg.total*100):0;
      agg.avgCheck=agg.checks>0?agg.total/agg.checks:0;
      agg.fotPct=agg.total>0?(agg.fotExp/agg.total*100):0;
      agg.revDay=agg.total/dim;agg.checksDay=agg.checks/dim;
      return agg;
    }
    var ci=getCashMonth(ym),am=getAcqMonth(ym);
    var eg=S.eg||EG0;
    var mExp=S.dds.filter(function(e){return e.ym===ym;});
    var cost=mExp.filter(function(e){return egType(eg,e.group)==="cogs";}).reduce(function(s,e){return s+(e.amount||0);},0);
    var opex=mExp.filter(function(e){return egType(eg,e.group)==="opex";}).reduce(function(s,e){return s+(e.amount||0);},0);
    var other=mExp.filter(function(e){return egType(eg,e.group)==="other";}).reduce(function(s,e){return s+(e.amount||0);},0);
    var totExp=mExp.reduce(function(s,e){return s+(e.amount||0);},0);
    var dim=dimOf(ym),isCur=ym===curYM(),todayD=new Date().getDate();
    // cashExp = только прямые расходы из кассы (нал+безнал)
    // Зарплаты НЕ включаем — они синхронизируются в dds как ФОТ
    var cashExp=ci.ect+ci.edt;
    var fixedT=(S.fixed||[]).filter(function(e){if(!e.amount||e.amount<=0)return false;var d=Math.min(e.day||1,dim);return!isCur||d<=todayD;}).reduce(function(s,e){return s+(e.amount||0);},0);
    var gross=ci.total-cost;

    var fc=ci.total>0?(cost/ci.total*100):0;
    var checks=0;for(var d=1;d<=dim;d++){var r=S.cash[ym+"-"+pad2(d)]||{};checks+=(+r.checksCount||0);}
    var avgCheck=checks>0?ci.total/checks:0;
    // Разбивка opex по категориям (ФОТ, Аренда, Коммуналка, Маркетинг, прочие опер.)
    var FOT_CATS=["ЗП повара","ЗП официанты","Зарплата","ФОТ"];
    var RENT_CATS=["Аренда"];
    var UTIL_CATS=["Коммуналка"];
    var MKT_CATS=["Реклама","Маркетинг"];
    function catSum(cats){return mExp.filter(function(e){return egType(eg,e.group)==="opex"&&cats.indexOf(e.cat)>=0;}).reduce(function(s,e){return s+(e.amount||0);},0);}
    var fotExp=catSum(FOT_CATS); // ФОТ только из расходов (dds). Зарплаты кассы учтены в cashExp
    var rentExp=catSum(RENT_CATS);
    var utilExp=catSum(UTIL_CATS);

    var opexOther=opex-catSum(FOT_CATS)-rentExp-utilExp-mktExp; // прочие операционные
    var opProfit=gross-opex-cashExp-commissions; // операционная прибыль = Валовая - все опер. расходы - кассовые - комиссии
    // Полная разбивка по opex-статьям для P&L

      opexByCat[e.cat]=(opexByCat[e.cat]||0)+(e.amount||0);

  function prevYM(ym){
    if(ym.slice(5)==="00") return (ym.slice(0,4)-1)+"-00";

  // Trend badge: ↑ +12% green / ↓ -8% red
  // invertColor=true → growth is bad (costs)
  function trendBadge(cur,prev,invertColor){
    if(!prev||prev===0||cur===prev)return'';
    var diff=cur-prev;
    var pct=Math.round(Math.abs(diff)/Math.abs(prev)*100);
    if(pct===0)return'';
    var up=diff>0;
    var good=invertColor?!up:up;
    var col=good?'#4ade80':'#ef4444';
    return '<span style="font-size:10px;font-weight:700;color:'+col+';background:'+col+'1a;border-radius:4px;padding:1px 6px;margin-left:4px;white-space:nowrap">'+(up?'↑':'↓')+' '+(up?'+':'-')+pct+'%</span>';
  }
  // Linear forecast to end of month (only for current month)
  function forecastEOM(ym,curTotal){
    if(ym!==curYM())return null;
    var d=new Date().getDate();
    if(d<3)return null;
    if(curTotal===0)return null;
    var dim=dimOf(ym);
    return Math.round(curTotal/d*dim);
  }

  function svgBarChart(bars, color, hlColor, valFmt){
    if(!bars||!bars.length)return'';
    var maxV=Math.max.apply(null,bars.map(function(b){return b.val||0;}));
    if(maxV<=0)return'';
    var H=72, LBL=14, VVAL=12, PAD=2;
    var totalH=H+LBL+VVAL+PAD;
    var n=bars.length;
    var gap=2;
    var vbW=n*18;
    var barW=18-gap;
    var parts=['<svg class="bar-svg" viewBox="0 0 '+vbW+' '+totalH+'" style="width:100%;height:'+(totalH)+'px;display:block;overflow:visible">'];
    bars.forEach(function(b,i){
      var v=b.val||0;
      var pct=maxV>0?v/maxV:0;
      var bh=Math.max(pct*H, v>0?3:0);
      var x=i*18;
      var col=b.isHighlight?(hlColor||'#6366f1'):(color||'#38bdf8');
      var y=VVAL+PAD+(H-bh);
      if(v>0){
        var lbl=valFmt?valFmt(v):''+v;
        parts.push('<text x="'+(x+barW/2)+'" y="'+(y-2)+'" text-anchor="middle" font-size="7" fill="'+col+'" opacity="0.9">'+lbl+'</text>');
      }
      parts.push('<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="2" fill="'+col+'" opacity="0.22"/>');
      if(bh>2)parts.push('<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="2" rx="1" fill="'+col+'"/>');
      parts.push('<text x="'+(x+barW/2)+'" y="'+(VVAL+PAD+H+LBL-1)+'" text-anchor="middle" font-size="8" fill="'+(b.isHighlight?col:'#64748b')+'" font-weight="'+(b.isHighlight?700:400)+'">'+b.label+'</text>');
    });
    parts.push('</svg>');
    return parts.join('');
  }

      h+='<div class="cd" style="margin-bottom:10px;border-left:3px solid '+barCol+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        +'<span style="font-size:12px;font-weight:700;color:#e2e8f0">План выручки</span>'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-size:13px;font-weight:800;color:'+barCol+'">'+pctRev+'%</span>'
        +'<span style="font-size:11px;color:#64748b">'+fmt(pl.total)+' / '+fmt(tgt.rev)+' ₸</span>'
        +'</div></div>'
        +'<div style="height:6px;border-radius:3px;background:rgba(255,255,255,.07)">'
        +'<div style="height:100%;border-radius:3px;width:'+barW+'%;background:'+barCol+'"></div></div>';
      h+='</div>';
    }

    // Cards grid
    if(cards.length){
      // Если в выбранных карточках есть "metrics" — рендерим его отдельным полноширинным блоком
      var metricsInCards=cards.indexOf('metrics')>=0;
      var regularCards=cards.filter(function(id){return id!=='metrics';});
      if(regularCards.length){
        h+='<div class="g2">';
        regularCards.forEach(function(id){
          var def=HOME_CARDS_DEF.find(function(x){return x.id===id;})||{label:id,color:"#64748b"};
          var cv=cardVals[id]||{v:"—",c:"#64748b"};
          var mom=cv.mom||"";
          var onClick=id==="rev"?"rev":null;
          var da=onClick?' data-card-click="'+onClick+'"':'';
          h+='<div class="cd" style="padding:10px 12px;cursor:'+(onClick?"pointer":"default")+';"'+da+'>';
          h+='<div style="font-size:14px;font-weight:800;text-align:center;color:'+cv.c+'">'+cv.v+'</div>';
          if(mom)h+='<div style="text-align:center;margin-top:2px">'+mom+'</div>';
          h+='<div style="font-size:10px;color:#64748b;margin-top:2px;text-align:center">'+def.label+'</div>';
          if(onClick)h+='<div style="width:100%;height:2px;border-radius:1px;background:'+cv.c+';opacity:.3;margin-top:6px"></div>';
          h+='</div>';
        });
        h+='</div>';
      }
      // Блок "Ключевые метрики" — объединённая карточка
      if(metricsInCards){
        var totalExpPct=pl.total>0?((pl.totExp+pl.cashExp+pl.commissions)/pl.total*100):0;
        var fotPctM=pl.total>0?(pl.fotExp/pl.total*100):0;
        var fcPctM=pl.fc||0;
        var avgChkM=pl.avgCheck||0;
        h+='<div class="cd" style="margin-bottom:10px;border-left:3px solid #6366f1">';
        h+='<div style="font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:10px">Ключевые метрики</div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
        // Фудкост %
        h+='<div style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04)">';
        h+='<div style="font-size:9px;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px">Фудкост</div>';
        h+='<div style="font-size:18px;font-weight:800;color:'+(fcPctM>40?'#ef4444':fcPctM>25?'#facc15':'#4ade80')+'">'+fcPctM.toFixed(1)+'%</div>';
        h+='';
        h+='</div>';
        // ФОТ %
        h+='<div style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04)">';
        h+='<div style="font-size:9px;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px">ФОТ</div>';
        h+='<div style="font-size:18px;font-weight:800;color:'+(fotPctM>35?'#ef4444':fotPctM>25?'#facc15':'#4ade80')+'">'+fotPctM.toFixed(1)+'%</div>';
        h+='';
        h+='</div>';
        // Расходы % от выручки
        h+='<div style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04)">';
        h+='<div style="font-size:9px;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px">Расходы</div>';
        h+='<div style="font-size:18px;font-weight:800;color:'+(totalExpPct>90?'#ef4444':totalExpPct>80?'#fb923c':totalExpPct>70?'#facc15':'#4ade80')+'">'+totalExpPct.toFixed(1)+'%</div>';
        h+='<div style="font-size:9px;color:#64748b;margin-top:2px">от выручки</div>';
        h+='</div>';
        // Средний чек
        h+='<div style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04)">';
        h+='<div style="font-size:9px;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px">Ср. чек</div>';
        h+='<div style="font-size:18px;font-weight:800;color:#a78bfa">'+fmt(Math.round(avgChkM))+'</div>';
        h+='<div style="font-size:9px;color:#64748b;margin-top:2px">тенге</div>';
        h+='</div>';
        h+='</div>';
        h+='</div>';
      }
    }

    // Charts/blocks
    if(charts.indexOf("pl")>=0){
      h+='<div class="cd" style="margin-bottom:10px;border-left:3px solid #6366f1">';
      h+='<div class="tab-sec-title">P&L отчёт</div>';
      h+=brRow("Выручка (касса)","+ "+fmt(pl.total)+" ₸","#38bdf8",true);
      h+=brRow("Себестоимость (продукты)","− "+fmt(pl.cost)+" ₸","#fb923c",false);
      if(pl.commissions>0)h+=brRow("  Комиссии (эквайринг)","− "+fmt(pl.commissions)+" ₸","#fb923c",false);
      var grossAfterVarH=pl.gross-pl.commissions;
      h+='<div style="display:flex;justify-content:space-between;padding:7px 10px;border-radius:8px;background:rgba(99,102,241,.08);margin:4px 0 8px">'
        +'<span style="font-size:13px;font-weight:700;color:#e2e8f0">Валовая прибыль</span>'
        +'<span style="font-size:14px;font-weight:800;color:'+(grossAfterVarH>=0?"#4ade80":"#ef4444")+'">'+fmt(grossAfterVarH)+' ₸</span></div>';
      if(pl.fotExp>0) h+=brRow('  ФОТ','− '+fmt(pl.fotExp)+' ₸','#ef4444',false);
      if(pl.rentExp>0) h+=brRow('  Аренда','− '+fmt(pl.rentExp)+' ₸','#ef4444',false);
      if(pl.utilExp>0) h+=brRow('  Коммуналка','− '+fmt(pl.utilExp)+' ₸','#ef4444',false);
      if(pl.mktExp>0) h+=brRow('  Маркетинг','− '+fmt(pl.mktExp)+' ₸','#ef4444',false);
      if(pl.cashExp>0) h+=brRow('  Расходы кассы','− '+fmt(pl.cashExp)+' ₸','#ef4444',false);
      if(pl.opexOther>0) h+=brRow('  Прочие операц.','− '+fmt(pl.opexOther)+' ₸','#ef4444',false);
      h+='<div style="display:flex;justify-content:space-between;margin:6px 0 8px;padding:6px 10px;border-radius:8px;background:rgba(167,139,250,.09);border:1px solid rgba(167,139,250,.2)">'
        +'<span style="font-size:12px;font-weight:700;color:#e2e8f0">Опер. прибыль</span>'
        +'<span style="font-size:13px;font-weight:800;color:'+(pl.opProfit>=0?'#a78bfa':'#ef4444')+'">'+(pl.opProfit>=0?'+':'')+fmt(pl.opProfit)+' ₸</span></div>';
      if(pl.other>0) h+=brRow("Прочие расходы","− "+fmt(pl.other)+" ₸","#64748b",false);
      if(pl.fixedT>0) h+=brRow("Постоянные расходы","− "+fmt(pl.fixedT)+" ₸","#a78bfa",false);
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;background:'+(pl.net>=0?"rgba(74,222,128,.08)":"rgba(239,68,68,.08)")+';border:1px solid '+(pl.net>=0?"rgba(74,222,128,.2)":"rgba(239,68,68,.2)")+';margin-top:4px">'
        +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px"><span style="font-size:13px;font-weight:700;color:#e2e8f0">Чистая прибыль</span>'+trendBadge(pl.net,plP.net)+'</div>'
        +'<span style="font-size:16px;font-weight:800;color:'+(pl.net>=0?"#4ade80":"#ef4444")+'">'+(pl.net>=0?"+":"")+fmt(pl.net)+' ₸</span></div>';
      if(isCur&&fcastNet){
        h+='<div style="font-size:11px;color:#64748b;margin-top:6px;padding:0 2px">Прогноз прибыли: <span style="font-weight:700;color:#6366f1">'+fmt(fcastNet)+' ₸</span></div>';
      }
      h+='</div>';
    }

    if(charts.indexOf("channels")>=0){
      var chs=Object.entries(pl.ci.by).filter(function(x){return x[1]>0;});
      if(chs.length){
        h+='<div class="cd" style="margin-bottom:10px">';
        h+='<div class="tab-sec-title">Каналы оплаты</div>';
        chs.forEach(function(x){
          var col=getPayColorByName(x[0]);
          var pct=pl.total>0?Math.round(x[1]/pl.total*100):0;
          h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'
            +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:'+col+'"></div><span style="font-size:12px;color:#e2e8f0">'+x[0]+'</span></div>'
            +'<span style="font-size:12px;font-weight:700;color:'+col+'">'+fmt(x[1])+' ₸ <span style="font-size:10px;color:#64748b">('+pct+'%)</span></span></div>'
            +'<div style="height:5px;border-radius:3px;background:rgba(255,255,255,.06)"><div style="height:100%;border-radius:3px;width:'+pct+'%;background:'+col+'"></div></div></div>';
        });
        h+='</div>';
      }
    }

    if(!isAllYear&&(charts.indexOf('days')>=0||charts.indexOf('checks')>=0)){
      var daysData=[];
      var refYm=ym,d0=isCur?todayD:dim;
      for(var d=Math.max(1,d0-13);d<=d0;d++){
        var ds=refYm+'-'+pad2(d);
        var r2=S.cash[ds]||{};
        var t2=getAllKeys().reduce(function(s,k){return s+(+r2[k]||0);},0);
        var ch2=+r2.checksCount||0;
        daysData.push({d:d,t:t2,ch:ch2,isToday:isCur&&d===todayD});
      }
      // График выручки по дням
      if(charts.indexOf('days')>=0){
        var maxT=Math.max.apply(null,daysData.map(function(x){return x.t;}));
        if(maxT>0){
          h+='<div class="cd" style="margin-bottom:10px">';
          h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
            +'<div class="tab-sec-title" style="margin-bottom:0">Выручка по дням <span style="color:#64748b;font-weight:500">('+MNS[mo-1]+')</span></div>'
            +'<span style="font-size:11px;color:#64748b">макс: '+fmt(maxT)+' ₸</span></div>';
          var dayBars=daysData.map(function(x){return{val:x.t,label:''+x.d,isHighlight:x.isToday};});
          h+=svgBarChart(dayBars,'#38bdf8','#6366f1',function(v){return v>=1000?Math.round(v/1000)+'k':''+v;});
          h+='</div>';
        }
      }
      // График чеков по дням
      if(charts.indexOf('checks')>=0){
        var maxCh=Math.max.apply(null,daysData.map(function(x){return x.ch;}));
        if(maxCh>0){
          var totChecks=daysData.reduce(function(s,x){return s+x.ch;},0);
          var avgChk=totChecks>0?Math.round(totChecks/daysData.filter(function(x){return x.ch>0;}).length):0;
          h+='<div class="cd" style="margin-bottom:10px">';
          h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
            +'<div class="tab-sec-title" style="margin-bottom:0">Чеки по дням <span style="color:#64748b;font-weight:500">('+MNS[mo-1]+')</span></div>'
            +'<div style="text-align:right">'
            +'<div style="font-size:11px;color:#facc15;font-weight:700">'+totChecks+' чек.</div>'
            +'<div style="font-size:10px;color:#64748b">ср/день: '+avgChk+'</div>'
            +'</div></div>';
          var chkBars=daysData.map(function(x){return{val:x.ch,label:''+x.d,isHighlight:x.isToday};});
          h+=svgBarChart(chkBars,'#facc15','#6366f1',function(v){return v>0?''+v:'';});
          h+='</div>';
        }
      }
    } else if(isAllYear&&(charts.indexOf('days')>=0)){
      // Год: показываем выручку по месяцам
      var monthBars=[];
      for(var mi2=1;mi2<=12;mi2++){
        var mym2=p[0]+"-"+pad2(mi2);
        var ciM=getCashMonth(mym2);
        monthBars.push({val:ciM.total,label:MNS[mi2-1]});
      }
      var maxMT=Math.max.apply(null,monthBars.map(function(x){return x.val;}));
      if(maxMT>0){
        h+='<div class="cd" style="margin-bottom:10px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
          +'<div class="tab-sec-title" style="margin-bottom:0">Выручка по месяцам</div>'
          +'<span style="font-size:11px;color:#64748b">'+p[0]+' год</span></div>';
        h+=svgBarChart(monthBars,'#38bdf8','#6366f1',function(v){return v>=1000000?Math.round(v/1000000)+'M':v>=1000?Math.round(v/1000)+'k':''+v;});
        h+='</div>';
      }
    }

    // ── ТБУ + Прогноз + Дневная цель + До прибыли ──────────────────────
    if(!isAllYear&&charts.indexOf('breakeven')>=0){
      // Переменные расходы (зависят от выручки, точные за период)
      var beVarCosts=(pl.cost||0)+(pl.commissions||0);
      // Постоянные расходы ЗА ПЕРИОД (фактические)
      var beFixedCostsPeriod=(pl.opex||0)+(pl.other||0)+(pl.cashExp||0)+(pl.fixedT||0);
      // Кол-во прошедших дней
      var beActiveDays=isCur&&todayD>0?todayD:dim;
      // Аннуализируем постоянные до полного месяца: (постоянные/дней прошло)*дней в месяце
      var beFixedCostsMonth=beActiveDays>0?Math.round(beFixedCostsPeriod/beActiveDays*dim):beFixedCostsPeriod;
      // Маржа вклада считается от текущей выручки (переменные пропорциональны выручке)
      var beMargin=pl.total>0?Math.max(0,pl.total-beVarCosts)/pl.total:0;
      // ТБУ текущего периода (на основе фактических постоянных)
      var beTBUperiod=beMargin>0?Math.round(beFixedCostsPeriod/beMargin):0;
      // ТБУ месяца (постоянные приведены к полному месяцу)
      var beTBUmonth=beMargin>0?Math.round(beFixedCostsMonth/beMargin):0;

      var beAvgCheck=pl.avgCheck||0;
      var beRev=pl.total;

      // Прогресс относительно ТБУ месяца
      var bePct=beTBUmonth>0?Math.min(100,Math.round(beRev/beTBUmonth*100)):0;
      var beReachedMonth=beRev>=beTBUmonth&&beTBUmonth>0;
      var beReachedPeriod=beRev>=beTBUperiod&&beTBUperiod>0;

      // Прогноз выручки на конец месяца (линейная экстраполяция по фактическим дням)
      // Только для текущего месяца, минимум 3 дня данных
      var beFcastRev=(isCur&&beActiveDays>=3&&beActiveDays<dim)?Math.round(beRev/beActiveDays*dim):null;
      var beFcastReached=beFcastRev&&beFcastRev>=beTBUmonth;

      // Дневная цель: ТБУ_месяца / дней в месяце
      var beDailyGoal=dim>0?Math.round(beTBUmonth/dim):0;
      var beTodayRev=0;
      if(isCur){
        var todayDs=ym+'-'+pad2(todayD);
        var todayR=S.cash[todayDs]||{};
        beTodayRev=getAllKeys().reduce(function(s,k){return s+(+todayR[k]||0);},0);
      }
      var beDailyOk=isCur&&beDailyGoal>0&&beTodayRev>=beDailyGoal;

      // До прибыли = ТБУ_месяца - текущая выручка
      var toProfit=Math.max(0,beTBUmonth-beRev);
      var checksNeeded=beAvgCheck>0?Math.ceil(toProfit/beAvgCheck):0;

      if(beTBUmonth>0||beFixedCostsPeriod>0){
        h+='<div class="cd" style="margin-bottom:10px;border-left:3px solid #facc15">';

        // Заголовок
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
        h+='<div class="tab-sec-title" style="margin-bottom:0">ТБУ и цели месяца</div>';
        h+=(beReachedMonth
          ?'<span style="font-size:11px;color:#4ade80;background:rgba(74,222,128,.1);border-radius:6px;padding:2px 8px;font-weight:700">✓ ТБУ достигнут</span>'
          :'<span style="font-size:11px;color:#facc15;background:rgba(250,204,21,.1);border-radius:6px;padding:2px 8px;font-weight:700">'+bePct+'%</span>');
        h+='</div>';

        // Прогресс-бар относительно ТБУ месяца
        h+='<div style="height:8px;border-radius:4px;background:rgba(255,255,255,.07);margin-bottom:12px">'
          +'<div style="height:100%;border-radius:4px;width:'+bePct+'%;background:'+(beReachedMonth?'#4ade80':'#facc15')+';transition:width .4s"></div></div>';

        // 2 ТБУ — текущего периода и месяца
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
        // ТБУ периода
        h+='<div style="padding:8px 10px;border-radius:8px;background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.15)">';
        h+='<div style="font-size:9px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">ТБУ периода<br>('+beActiveDays+' дн.)</div>';
        h+='<div style="font-size:14px;font-weight:800;color:'+(beReachedPeriod?'#4ade80':'#facc15')+'">'+fmt(beTBUperiod)+' ₸</div>';
        h+='<div style="font-size:9px;margin-top:2px;color:'+(beReachedPeriod?'#4ade80':'#ef4444')+'">'+(beReachedPeriod?'✓ достигнут':'не достигнут')+'</div>';
        h+='</div>';
        // ТБУ месяца
        h+='<div style="padding:8px 10px;border-radius:8px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15)">';
        h+='<div style="font-size:9px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">ТБУ месяца<br>('+dim+' дн.)</div>';
        h+='<div style="font-size:14px;font-weight:800;color:'+(beReachedMonth?'#4ade80':'#6366f1')+'">'+fmt(beTBUmonth)+' ₸</div>';

        h+='</div>';
        h+='</div>';

        // До прибыли — крупный блок
        if(!beReachedMonth&&toProfit>0){
          h+='<div style="margin-bottom:10px;padding:10px 12px;border-radius:10px;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2)">';
          h+='<div style="font-size:9px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Осталось до прибыли (в месяц)</div>';
          h+='<div style="font-size:22px;font-weight:800;color:#fb923c">'+fmt(toProfit)+' ₸</div>';
          if(checksNeeded>0)h+='<div style="font-size:11px;color:#64748b;margin-top:3px">≈ '+checksNeeded+' чеков при среднем '+fmt(beAvgCheck)+' ₸</div>';
          h+='</div>';
        } else if(beReachedMonth){
          var beProfit=beRev-beTBUmonth;
          h+='<div style="margin-bottom:10px;padding:10px 12px;border-radius:10px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2)">';
          h+='<div style="font-size:9px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Прибыль сверх ТБУ месяца</div>';
          h+='<div style="font-size:22px;font-weight:800;color:#4ade80">+'+fmt(beProfit)+' ₸</div>';
          h+='</div>';
        }

        // Прогноз выручки на конец месяца (исправленный)
        if(beFcastRev!==null){
          h+='<div style="margin-bottom:8px;padding:8px 12px;border-radius:8px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.15)">';
          h+='<div style="display:flex;justify-content:space-between;align-items:center">';
          h+='<div>';
          h+='<div style="font-size:11px;color:#64748b">Прогноз на конец месяца</div>';

          h+='</div>';
          h+='<span style="font-size:15px;font-weight:800;color:'+(beFcastReached?'#4ade80':'#ef4444')+'">'+fmt(beFcastRev)+' ₸</span>';
          h+='</div>';
          h+='<div style="font-size:10px;margin-top:4px;color:'+(beFcastReached?'#4ade80':'#ef4444')+'">'
            +(beFcastReached?'✓ ТБУ месяца будет достигнут':'⚠ ТБУ месяца недостижим при текущем темпе')+'</div>';
          h+='</div>';
        }

        // Дневная цель

  // ── CASH TAB ──────────────────────────────────────────────────────────
  // Обновляет только итоги/сверку в DOM без полной перерисовки
  // Вызывается после каждого ввода числа — не мешает фокусу
  function cashUpdateTotalsDOM(){
    if(S.tab!=="cash"||S.cashMode!=="day")return;
    var date=S.cashDate;
    var _d=new Date(date+'T00:00:00');_d.setDate(_d.getDate()-1);
    var pDate=_d.getFullYear()+'-'+pad2(_d.getMonth()+1)+'-'+pad2(_d.getDate());
    var pR=S.cash[pDate]||{};
    var r=S.cash[date]||{};
    function g(k){return r[k]!=null?r[k]:0;}

    // Пересчёт итогов
    var totH=getPayKeys().reduce(function(s,k){return s+(+g("hall"+k)||0);},0);
    var totD2=getPayKeys().reduce(function(s,k){return s+(+g("del"+k)||0);},0);
    var tot=totH+totD2;
    var checks=+g("checksCount")||0;
    var avg=checks>0?Math.round(tot/checks):0;

    var expC=g("expCash")||[];
    var expCard=g("expCard")||[];
    var sals=g("salaries")||[];
    var totEC=expC.reduce(function(s,e){return s+(e.amount||0);},0);
    var totED=expCard.reduce(function(s,e){return s+(e.amount||0);},0);
    var salC=sals.filter(function(x){return x.type==="cash";}).reduce(function(s,x){return s+(x.amount||0);},0);
    var salCard=sals.filter(function(x){return x.type==="card";}).reduce(function(s,x){return s+(x.amount||0);},0);

    var clNal=calcCloseNal(r,+pR.closingNal||0);
    var clPerev=calcClosePerev(r,+pR.closingPerev||0);
    var incNal=g("incassationCash");
    var incPerev=g("incassationPerev");
    var ck=getCashKeys();
    var totNal=ck.nal.reduce(function(s,k){return s+(+g(k)||0);},0);
    var totPerev=ck.perev.reduce(function(s,k){return s+(+g(k)||0);},0);

    // Обновляем только нужные элементы
    function setTxt(sel,val){
      var el=document.querySelector(sel);
      if(el&&document.activeElement!==el)el.textContent=val;
    }
    function setStyle(sel,prop,val){
      var el=document.querySelector(sel);
      if(el)el.style[prop]=val;
    }
    // Итоги в заголовках секций (data-sec-total атрибуты)
    var app=document.getElementById("app");
    if(!app)return;
    // Обновляем секционные суммы
    var secMap={
      "hall":fmt(totH)+" ₸",
      "del":fmt(totD2)+" ₸",
      "expC":fmt(totEC)+" ₸",
      "expD":fmt(totED)+" ₸",
      "sal":fmt(salC+salCard)+" ₸"
    };
    Object.keys(secMap).forEach(function(sid){
      var btn=app.querySelector('[data-cash-toggle="'+sid+'"]');
      if(btn){
        var span=btn.querySelector('span[data-sec-val]');
        if(span)span.textContent=secMap[sid];
      }
    });
    // Сводные карточки вверху
    var cards3=app.querySelectorAll('.cash-summary-val');
    if(cards3.length>=3){
      cards3[0].textContent=fmt(tot)+" ₸";
      cards3[1].textContent=checks||0;
      cards3[2].textContent=fmt(avg)+" ₸";
    }
    // Сверка кассы
    var svEls=app.querySelectorAll('[data-sv-val]');
    svEls.forEach(function(el){
      var key=el.getAttribute('data-sv-val');
      var vals={
        'totNal':fmt(totNal)+" ₸",
        'totPerev':fmt(totPerev)+" ₸",
        'totEC':fmt(totEC)+" ₸",
        'totED':fmt(totED)+" ₸",
        'salC':fmt(salC)+" ₸",
        'salCard':fmt(salCard)+" ₸",
        'incNal':fmt(incNal)+" ₸",
        'incPerev':fmt(incPerev)+" ₸",
        'clNal':fmt(clNal)+" ₸",
        'clPerev':fmt(clPerev)+" ₸"
      };
      if(vals[key]!==undefined)el.textContent=vals[key];
    });
    // Фактический остаток - diff boxes
    var factNal=+g("factNal")||0;
    var factPerev=+g("factPerev")||0;
    var diffEls=app.querySelectorAll('[data-diff-val]');
    diffEls.forEach(function(el){
      var key=el.getAttribute('data-diff-val');
      var diff=key==='nal'?(factNal-clNal):(factPerev-clPerev);
      el.textContent=(diff>=0?"+":"")+fmt(diff)+" ₸";
      el.style.color=Math.abs(diff)<10?"#4ade80":"#ef4444";
    });
    var diffBoxEls=app.querySelectorAll('[data-diff-box]');
    diffBoxEls.forEach(function(el){
      var key=el.getAttribute('data-diff-box');
      var diff=key==='nal'?(factNal-clNal):(factPerev-clPerev);
      var ok=Math.abs(diff)<10;
      el.style.background=ok?"rgba(74,222,128,.08)":"rgba(239,68,68,.08)";
      el.style.borderColor=ok?"rgba(74,222,128,.2)":"rgba(239,68,68,.2)";
    });
  }
  var CASH_NUM_KEYS_STATIC=["checksCount","incassationCash","incassationPerev","incassationCard","factNal","factPerev","factCash","factCard","closingNal","closingPerev","closingCash","closingCard"];
  function getCashNumKeys(){
    var base=getAllKeys().concat(CASH_NUM_KEYS_STATIC);
    // Добавляем hallP<id> для кастомных способов оплаты (например "под ЗП")
    (S.pays||[]).forEach(function(pm){
      var hk="hallP"+pm.id,dk="delP"+pm.id;
      if(base.indexOf(hk)<0){base.push(hk);}
      if(base.indexOf(dk)<0){base.push(dk);}
    });
    return base;
  }
  function cashUpd(key,val,skipRender){
    var _d=new Date(S.cashDate+'T00:00:00');_d.setDate(_d.getDate()-1);
    var pDate=_d.getFullYear()+'-'+pad2(_d.getMonth()+1)+'-'+pad2(_d.getDate());
    var pR=S.cash[pDate]||{};
    var u=Object.assign({},S.cash[S.cashDate]||{});
    u[key]=getCashNumKeys().indexOf(key)>=0?(+val||0):val;
    u.closingNal=calcCloseNal(u, +pR.closingNal||0);
    u.closingPerev=calcClosePerev(u, +pR.closingPerev||0);
    u.closingCash=u.closingNal+u.closingPerev;
    u.closingCard=calcCloseCard(u, +pR.closingCard||0);
    var nc=Object.assign({},S.cash);nc[S.cashDate]=u;
    S.cash=normalizeCash(nc);
    saveCashDay(S.cashDate, S.cash[S.cashDate]); // один ключ = один день
    if(!skipRender){syncSalariesToDDS(S.cashDate);render();}
  }

  // ── AUTH EVENT BINDING ────────────────────────────────────────────────
  function bindAuthEvents(){
    var app=document.getElementById("app");
    // Email/pass inputs - update state without re-render
    var emailEl=app.querySelector("[data-auth-email]");
    var passEl=app.querySelector("[data-auth-pass]");
    if(emailEl)emailEl.addEventListener("input",function(){S.authEmail=emailEl.value;});
    if(passEl)passEl.addEventListener("input",function(){S.authPass=passEl.value;});

    var toggleEl=app.querySelector("[data-auth-toggle]");
    if(toggleEl)toggleEl.addEventListener("click",function(){
      set({authScreen:S.authScreen==="login"?"register":"login",authErr:""});
    });

    var submitEl=app.querySelector("[data-auth-submit]");
    if(submitEl)submitEl.addEventListener("click",async function(){
      if(S.authLoading)return;
      var email=(S.authEmail||"").trim();
      var pass=S.authPass||"";
      if(!email||!pass){set({authErr:"Введите email и пароль"});return;}
      set({authLoading:true,authErr:""});
      try{
        if(S.authScreen==="register"){
          await sbSignUp(email,pass);
          // After signup auto-login (works if email confirmation is disabled in Supabase)
          try{await sbSignIn(email,pass);}
          catch(se){
            // Email confirmation may be required
            set({authLoading:false,authErr:"Регистрация успешна! Подтвердите email и войдите."});
            return;
          }
        } else {
          await sbSignIn(email,pass);
        }
        await loadAppVenues();
      }catch(e){
        var msg=e.message||"Ошибка входа";
        if(msg.indexOf("Invalid login")>=0||msg.indexOf("invalid_grant")>=0)msg="Неверный email или пароль";
        if(msg.indexOf("already registered")>=0)msg="Email уже зарегистрирован";
        if(msg.indexOf("Password should")>=0)msg="Пароль минимум 6 символов";
        set({authLoading:false,authErr:msg});
      }
    });

    // Venue picker
    app.querySelectorAll("[data-pick-venue]").forEach(function(el){
      el.addEventListener("click",async function(){
        var vid=el.getAttribute("data-pick-venue");
        await switchVenue(vid);
      });
    });

    // Create new venue
    var nvnEl=app.querySelector("[data-new-venue-name]");
    if(nvnEl)nvnEl.addEventListener("input",function(){S.newVenueName=nvnEl.value;});
    var cvEl=app.querySelector("[data-create-venue]");
    if(cvEl)cvEl.addEventListener("click",async function(){
      var name=(S.newVenueName||"").trim();
      if(!name){set({authErr:"Введите название"});return;}
      try{
        var v=await sbCreateVenue(name);
        _venues=await sbLoadVenues();
        S.venueList=_venues;
        S.newVenueName="";
        await switchVenue(v.id);
      }catch(e){set({authErr:e.message||"Ошибка создания"});}
    });

    var logoutEl=app.querySelector("[data-auth-logout]");
    if(logoutEl)logoutEl.addEventListener("click",function(){
      sbSignOut();
      S.authScreen="login";S.authEmail="";S.authPass="";S.authErr="";
      S.venueList=[];S.venueDropOpen=false;
      render();
    });

    // Enter key behavior
    if(emailEl)emailEl.addEventListener("keydown",function(e){
      if(e.key==="Enter"&&passEl){passEl.focus();}
    });
    if(passEl)passEl.addEventListener("keydown",function(e){
      if(e.key==="Enter"){var sub=app.querySelector("[data-auth-submit]");if(sub)sub.click();}
    });
  }

  async function loadAppVenues(){
    try{
      // Resolve pending invitations: if user was invited by email, link their user_id
      if(_sbSession&&_sbSession.user){
        var userEmail=(_sbSession.user.email||"").toLowerCase();
        if(userEmail){
          try{
            // Ищем все заведения где этот email приглашён через kv_store bj_invites_{venue_id}
            // Получаем все kv записи с ключом bj_invites_* через поиск по prefix
            var allInviteKvs=await sbFetch("/rest/v1/kv_store?select=venue_id,key,value&key=like.bj_invites_*");
            if(allInviteKvs&&allInviteKvs.length){
              await Promise.all(allInviteKvs.map(async function(kv){
                try{
                  var emails=JSON.parse(kv.value)||[];
                  if(!Array.isArray(emails))return;
                  if(emails.indexOf(userEmail)<0)return;
                  // Email найден — добавляем в venue_members
                  var vid=kv.venue_id;
                  // Используем RPC функцию с security definer — она обходит RLS
                  await sbFetch("/rest/v1/rpc/accept_invite",{
                    method:"POST",
                    body:JSON.stringify({p_venue_id:vid,p_email:userEmail})
                  });
                  // Удаляем email из списка приглашений
                  var updated=emails.filter(function(e){return e!==userEmail;});
                  await sbFetch("/rest/v1/kv_store?venue_id=eq."+vid+"&key=eq.bj_invites_"+vid,{
                    method:"PATCH",
                    headers:{"Prefer":"return=minimal"},
                    body:JSON.stringify({value:JSON.stringify(updated),updated_at:new Date().toISOString()})
                  });
                }catch(ex){console.warn("invite resolve kv err",ex);}
              }));
            }
          }catch(e){console.warn("invite resolve err",e);}
        }
      }
      _venues=await sbLoadVenues();
      S.venueList=_venues;
      if(!_venues.length){
        // Нет заведений после resolve — показываем экран выбора/создания
        // Для кассира покажем объяснение, для владельца — форму создания
        set({authScreen:"venues",authLoading:false,authErr:""});
        return;
      }
      // Восстанавливаем последнее заведение
      var savedVenueId=lsGet("esep_venue");
      var found=_venues.find(function(v){return v.id===savedVenueId;});
      if(found){
        await switchVenue(found.id,true);
      } else if(_venues.length===1){
        await switchVenue(_venues[0].id,true);
      } else {
        // Несколько заведений — показываем выбор
        set({authScreen:"venues",authLoading:false,venueList:_venues,authErr:""});
      }
    }catch(e){
      set({authLoading:false,authErr:"Ошибка загрузки: "+e.message});
    }
  }

  async function switchVenue(vid,silent){
    _venueId=vid;
    var v=_venues.find(function(x){return x.id===vid;})||{};
    _venueRole=v._role||"owner";
    lsSet("esep_venue",vid);
    // Reset UI state for new venue
    S.venueDropOpen=false;
    S.authScreen="app";
    S.authLoading=false;
    S.fixed=null;
    S.pays=null;
    S.cash={};S.dds=[];S.cal=[];S.eg=null;
    S.tab=(_venueRole==="cashier")?"cash":"home";
    render();
    await loadVenueData();
  }

  async function loadVenueData(){
    try{
      var keys=["bj_fixed","bj_pays","bj_dds3","bj_cal","bj_home_cards","bj_home_charts","bj_venue","bj_targets","bj_trash","bj_shiftUnlocked","bj_expgroups"];
      var kvMap=await sbKvGetAll(keys);
      // Если данных нет совсем (новое заведение) — применяем SEED_BACKUP
      var hasData=kvMap["bj_pays"]||kvMap["bj_dds3"]||kvMap["bj_venue"];
      if(!hasData&&SEED_BACKUP&&_venueRole==="owner"){
        var sb=SEED_BACKUP;
        S.pays=migratePays(sb.bj_pays||P0);
        S.fixed=sb.bj_fixed||F0;
        S.eg=migrateEG(sb.bj_expgroups)||EG0;
        S.venue=sb.bj_venue||{};
        S.homeCards=sb.bj_home_cards||HOME_CARDS_DEFAULT;
        S.shiftUnlocked=sb.bj_shiftUnlocked||{};
        // Загружаем cash из seed и сохраняем в Supabase
        var seedCash=normalizeCash(sb.bj_cash||{});
        S.cash=seedCash;
        Object.keys(seedCash).forEach(function(date){if(seedCash[date])saveCashDay(date,seedCash[date]);});
        // Синхронизируем зарплаты
        Object.keys(seedCash).forEach(function(date){
          var r=seedCash[date]||{};
          if(r.salaries&&r.salaries.length>0)syncSalariesToDDS(date);
        });
        // Сохраняем в kv
        save("bj_pays",S.pays);save("bj_fixed",S.fixed);save("bj_expgroups",S.eg);
        save("bj_venue",S.venue);save("bj_home_cards",S.homeCards);save("bj_shiftUnlocked",S.shiftUnlocked);
        S.cal=[];S.targets={};S.trash=[];
        render();return;
      }
      var rawEg=kvMap["bj_expgroups"]||null;
      S.eg=migrateEG(rawEg)||EG0;
      S.fixed=kvMap["bj_fixed"]||F0;
      S.pays=migratePays(kvMap["bj_pays"]||P0);
      S.dds=kvMap["bj_dds3"]||[];
      S.cal=kvMap["bj_cal"]||[];
      if(kvMap["bj_shiftUnlocked"])S.shiftUnlocked=kvMap["bj_shiftUnlocked"];
      // Venue info
      var vdata=_venues.find(function(v){return v.id===_venueId;})||{};
      // Базовые поля из venues таблицы, owner/email/phone/bin из bj_venue (kv_store)
      var kvVenue=kvMap["bj_venue"]||{};
      S.venue={
        name:kvVenue.name||vdata.name||"",
        address:kvVenue.address||vdata.address||"",
        phone:kvVenue.phone||"",
        bin:kvVenue.bin||"",
        owner:kvVenue.owner||"",
        email:kvVenue.email||""
      };
      if(kvMap["bj_targets"]){
        // Strip legacy net field to prevent NaN
        var rawTgts=kvMap["bj_targets"];
        Object.keys(rawTgts).forEach(function(k){if(rawTgts[k])delete rawTgts[k].net;});
        S.targets=rawTgts;
      }
      if(kvMap["bj_trash"]&&kvMap["bj_trash"].length)S.trash=kvMap["bj_trash"];
      var validCardIds=HOME_CARDS_DEF.map(function(x){return x.id;});
      if(kvMap["bj_home_cards"])S.homeCards=kvMap["bj_home_cards"].filter(function(id){return validCardIds.indexOf(id)>=0;});
      if(kvMap["bj_home_charts"])S.homeCharts=kvMap["bj_home_charts"].filter(function(id){return HOME_CHARTS_DEF.map(function(x){return x.id;}).indexOf(id)>=0;});
      // Load cash
      var cashData=await loadCashAllMonths();
      S.cash=normalizeCash(cashData);
      save("bj_pays",S.pays);
      Object.keys(S.cash).forEach(function(date){
        var r=S.cash[date];
        if(r&&r.salaries&&r.salaries.length)syncSalariesToDDS(date);
      });
      render();
      setTimeout(checkUpcomingPayments,800);
    }catch(e){
      console.error("loadVenueData error",e);
      // Show error as overlay, stay on app screen
      S.fixed=S.fixed||F0; // prevent infinite loading screen
      alert("Ошибка загрузки данных: "+(e.message||e));
      render();
    }
  }

  // ── EVENT BINDING ─────────────────────────────────────────────────────
  function bindEvents(){
    var root=document.getElementById("app");

    // Hide keyboard on Enter for all inputs
    root.querySelectorAll("input").forEach(function(el){
      el.addEventListener("keydown",function(e){
        if(e.key==="Enter"){el.blur();}
      });
    });

    // Month pickers
    root.querySelectorAll("[data-mp]").forEach(function(el){
      el.addEventListener("change",function(){
        var id=el.getAttribute("data-mp"),type=el.getAttribute("data-mpt");
        var ymKey={home:"homeYm",cal:"calYm",cashM:"cashYm",exp:"expYm"}[id];
        if(!ymKey)return;
        var cur=S[ymKey];
        // Support "За весь год": stored as YYYY-00
        var isAllYear=cur.length===7&&cur.slice(5)==="00";
        var curYr=+cur.slice(0,4);
        var curMo=isAllYear?-1:+cur.slice(5,7)-1;
        if(type==="y") curYr=+el.value; else curMo=+el.value;
        var nv=curMo===-1?(curYr+"-00"):(curYr+"-"+pad2(curMo+1));
        var patch={};patch[ymKey]=nv;
        if(id==="cal")patch.calSel=null;
        set(patch);
      });
    });

    // Tab buttons
    root.querySelectorAll("[data-tab]").forEach(function(el){
      el.addEventListener("click",function(){set({tab:el.getAttribute("data-tab")});});
    });

    // Shift close / unlock
    var shiftCloseEl=root.querySelector('[data-shift-close]');
    if(shiftCloseEl) shiftCloseEl.addEventListener('click',function(){
      cashUpd('shiftStatus','closed',false);
      cashUpd('shiftClosedAt',new Date().toISOString(),false);
      var nu=Object.assign({},S.shiftUnlocked);delete nu[S.cashDate];
      save('bj_shiftUnlocked',nu);set({shiftUnlocked:nu});
    });
    var shiftUnlockEl=root.querySelector('[data-shift-unlock]');
    if(shiftUnlockEl) shiftUnlockEl.addEventListener('click',function(){
      var nu=Object.assign({},S.shiftUnlocked);nu[S.cashDate]=true;
      save('bj_shiftUnlocked',nu);set({shiftUnlocked:nu});
    });

    // Generic toggles
    root.querySelectorAll("[data-toggle]").forEach(function(el){
      el.addEventListener("click",function(){
        var k=el.getAttribute("data-toggle");
        var patch={};patch[k]=!S[k];
        set(patch);
      });
    });

    // Venue picker (in drop when app is open)
    root.querySelectorAll("[data-pick-venue]").forEach(function(el){
      el.addEventListener("click",async function(){
        var vid=el.getAttribute("data-pick-venue");
        await switchVenue(vid);
      });
    });
    var nvnEl2=root.querySelector("[data-new-venue-name]");
    if(nvnEl2)nvnEl2.addEventListener("input",function(){S.newVenueName=nvnEl2.value;});
    var cvEl2=root.querySelector("[data-create-venue]");

      if(navigator.share&&/iphone|ipad|ipod/i.test(navigator.userAgent)){

          return;
        }catch(e){/* fallback */}
      }
      // Telegram WebApp — копируем текст или используем clipboard
      if(window.Telegram&&window.Telegram.WebApp){
        try{
          var blob2=new Blob([json],{type:"application/octet-stream"});
          var url2=URL.createObjectURL(blob2);
          var a2=document.createElement("a");
          a2.href=url2;a2.download=fname;a2.style.display="none";

        window.Telegram.WebApp.showAlert("Backup: "+json.slice(0,200)+"...");
        return;

      var blob=new Blob([json],{type:"application/json"});

      var a=document.createElement("a");
      a.href=url;a.download=fname;a.style.display="none";

    // CSV export
    var csvBtn=root.querySelector("[data-cfg-export-csv]");
    if(csvBtn) csvBtn.addEventListener("click",async function(){
      // Динамические заголовки по реальным способам оплаты
      var pays=S.pays||P0;
      var payKeys=pays.map(function(p){return getPayKey(p);});
      var header=["Дата"];
      pays.forEach(function(p){header.push(p.name+"_зал");});
      pays.forEach(function(p){header.push(p.name+"_дост");});
      header=header.concat(["Итого","Чеков","Ср_чек","Расходы_нал","Расходы_безнал","Зарплаты_нал","Зарплаты_карт","Инкасс","Факт_нал","Остаток_нал","Остаток_карт"]);
      var rows=[header];
      var dates=Object.keys(S.cash).sort();
      dates.forEach(function(date){
        var r=S.cash[date]||{};
        var tot=payKeys.reduce(function(s,k){return s+(+r["hall"+k]||0)+(+r["del"+k]||0);},0);
        var ch=+r.checksCount||0;
        var avg=ch>0?Math.round(tot/ch):0;
        var ec=(r.expCash||[]).reduce(function(s,e){return s+(e.amount||0);},0);
        var ed=(r.expCard||[]).reduce(function(s,e){return s+(e.amount||0);},0);
        var salNal=(r.salaries||[]).filter(function(x){return x.type==="cash";}).reduce(function(s,x){return s+(x.amount||0);},0);
        var salCard=(r.salaries||[]).filter(function(x){return x.type!=="cash";}).reduce(function(s,x){return s+(x.amount||0);},0);
        var row=[date];
        payKeys.forEach(function(k){row.push(+r["hall"+k]||0);});
        payKeys.forEach(function(k){row.push(+r["del"+k]||0);});
        row=row.concat([tot,ch,avg,ec,ed,salNal,salCard,r.incassationCash||0,r.factNal||0,r.closingNal||0,r.closingCard||0]);
        rows.push(row);
      });
      // Итоговая строка
      if(rows.length>1){
        var totRow=["ИТОГО"];
        for(var ci=1;ci<rows[1].length;ci++){
          var colSum=0;
          for(var ri=1;ri<rows.length;ri++){colSum+=Number(rows[ri][ci])||0;}
          totRow.push(ci>=header.indexOf("Ср_чек")&&ci<=header.indexOf("Ср_чек")?Math.round(colSum/(rows.length-1)):colSum);
        }
        rows.push(totRow);
      }
      var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');

      var fname="kassi_"+new Date().toISOString().slice(0,10)+".csv";
      // iOS share
      if(navigator.share&&/iphone|ipad|ipod/i.test(navigator.userAgent)){
        try{
          var file=new File([bom+csv],fname,{type:"text/csv"});
          await navigator.share({files:[file],title:"ESEP Касса"});
          return;
        }catch(e){}
      }
      var blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url;a.download=fname;a.style.display="none";
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    });

    if(_venueRole==="owner"){
      h+='<div style="font-size:12px;color:#64748b;margin-bottom:8px">Сбросить все данные кассы и расходов этого заведения (без удаления самого заведения).</div>'
        +'<button class="btn" style="width:100%;background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3);margin-bottom:8px" data-cfg-reset>'
        +'Сбросить данные заведения</button>'
        +'<div style="border-top:1px solid rgba(239,68,68,.15);padding-top:8px;margin-top:4px">'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:8px">Полностью удалить заведение и все его данные. Необратимо.</div>'
        +'<button class="btn" style="width:100%;background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.4)" data-cfg-delete-venue>'
        +'🗑 Удалить заведение</button>'
        +'</div>';
    }
    h+='</div>';

    // ── О приложении ──────────────────────────────────────────────────
    h+='<div class="cd" style="margin-bottom:12px;text-align:center">'
      +'<div style="font-size:20px;font-weight:900;background:linear-gradient(135deg,#6366f1,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px">ESEP</div>'
      +'<div style="font-size:11px;color:#475569;letter-spacing:2px">АНАЛИТИКА · v1.1</div>'
      +'</div>';

    return h;
  }


  // Синхронизация зарплат из кассы → ФОТ в вкладке Расходы
  // Для каждой даты с зарплатами создаёт/обновляет записи в S.dds
  function syncSalariesToDDS(date){
    var r=S.cash[date]||{};
    var sals=r.salaries||[];
    var ym=date.slice(0,7);
    // Находим opex-группу для ФОТ
    var eg=S.eg||EG0;
    var fotGroup=null;
    Object.keys(eg).forEach(function(g){
      if((eg[g].type||eg[g])==='opex'){
        if(!fotGroup)fotGroup=g;
      }
    });
    if(!fotGroup)fotGroup='Операционные';
    // Удаляем старые авто-записи ФОТ для этой даты
    var syncPrefix='_sal_'+date+'_';
    var nd=S.dds.filter(function(e){return!(e._sync&&e._sync.indexOf(syncPrefix)===0);});
    // Создаём новые записи из текущих зарплат
    sals.forEach(function(sal){
      if(!sal.amount||sal.amount<=0)return;
      nd.push({
        id: Math.floor(Date.now()*1000+Math.random()*999),
        ym: ym,
        group: fotGroup,
        cat: 'ФОТ',
        amount: sal.amount||0,
        date: date,
        note: (sal.name||'Зарплата')+' (авто)',
        _sync: syncPrefix+(sal.id||0)
      });
    });
    S.dds=nd;
    save('bj_dds3',nd);
  }

  // Устаревшие способы оплаты — Под ЗП, Дина, Маркетинг — удаляются при загрузке
  var REMOVED_PAY_NAMES=["Под ЗП","Дина","Маркетинг"];
  var REMOVED_CASH_KEYS=["hallPodZp","delPodZp","hallDina","delDina","hallMkt","delMkt"];
  function migratePays(pays){
    if(!Array.isArray(pays))return pays;
    return pays.filter(function(pm){return REMOVED_PAY_NAMES.indexOf(pm.name)<0;});
  }
  // Нормализация: конвертирует все числовые поля cash из строк в числа
  function normalizeCash(cash){
    if(!cash||typeof cash!=="object")return{};
    var NUM=getCashNumKeys();
    var out={};
    Object.keys(cash).forEach(function(date){
      var r=cash[date];
      if(!r||typeof r!=="object"){out[date]=r;return;}
      var nr=Object.assign({},r);
      REMOVED_CASH_KEYS.forEach(function(k){delete nr[k];});
      NUM.forEach(function(k){if(nr[k]!=null)nr[k]=+nr[k]||0;});
      if(Array.isArray(nr.expCash))nr.expCash=nr.expCash.map(function(e){return Object.assign({},e,{amount:+e.amount||0});});
      if(Array.isArray(nr.expCard))nr.expCard=nr.expCard.map(function(e){return Object.assign({},e,{amount:+e.amount||0});});
      if(Array.isArray(nr.salaries))nr.salaries=nr.salaries.map(function(e){return Object.assign({},e,{amount:+e.amount||0});});
      out[date]=nr;
    });
    return out;
  }

  // ── Telegram уведомления о платежах завтра ──────────────────────────────
  function checkUpcomingPayments(){
    if(!window.Telegram||!window.Telegram.WebApp||!window.Telegram.WebApp.showAlert)return;
    var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
    var tomorrowDay=tomorrow.getDate();
    var ym=curYM();
    var dim=dimOf(ym);
    var due=(S.fixed||[]).filter(function(e){
      if(!e.amount||e.amount<=0)return false;
      return Math.min(e.day||1,dim)===tomorrowDay;
    });
    // Also check calendar events
    var dueCal=S.cal.filter(function(e){return e.ym===ym&&e.day===tomorrowDay&&e.amount>0;});
    var all=due.concat(dueCal);
    if(!all.length)return;
    var notifKey='bj_notif_'+ym+'_'+tomorrowDay;
    try{if(localStorage.getItem(notifKey))return;}catch(e){}
    var names=all.map(function(e){return(e.name||e.cat||'Платёж')+': '+fmt(e.amount||0)+' ₸';});
    var msg='Завтра ('+tomorrowDay+' '+MNS[+ym.slice(5,7)-1]+') запланированы платежи: '+names.join(', ');
    window.Telegram.WebApp.showAlert(msg);
    try{localStorage.setItem(notifKey,'1');}catch(e){}
  }

  // ── INIT ──────────────────────────────────────────────────────────────
  (async function(){
    // Показываем лоадер
    render();
    // Пробуем восстановить сессию из localStorage
    var saved=lsGet("esep_session");
    if(saved&&saved.refresh_token){
      var ok=await sbRefreshSession(saved.refresh_token);
      if(!ok){
        // refresh failed — покажем экран входа
        set({authScreen:"login"});
        return;
      }
      // Сессия восстановлена — грузим заведения
      await loadAppVenues();
    } else {
      // Нет сессии — экран входа
      set({authScreen:"login"});
    }
  })();
})();
